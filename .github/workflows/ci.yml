name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cashguard
          POSTGRES_PASSWORD: cashguard_secret
          POSTGRES_DB: cashguard_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    env:
      PYTHONPATH: "."
      DATABASE_URL: postgresql+asyncpg://cashguard:cashguard_secret@localhost:5432/cashguard_test
      REDIS_URL: redis://localhost:6379/15
      SECRET_KEY: test-secret-key-32-chars-minimum-x
      MASTER_KEY: test-master-key-32-chars-minimum-x
      APP_MODE: mock
      MARKET_DATA_PROVIDER: mock
      LIVE_TRADING_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Lint changed Python files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_RANGE="origin/${{ github.base_ref }}..HEAD"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            DIFF_RANGE="${{ github.event.before }}..HEAD"
          else
            DIFF_RANGE="HEAD~1..HEAD"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only --diff-filter=ACMR "$DIFF_RANGE" | grep '^apps/api/' | sed 's|^apps/api/||' | grep '\.py$' || true)
          if ((${#CHANGED_FILES[@]})); then
            python -m ruff check "${CHANGED_FILES[@]}"
          else
            echo "No python files changed in apps/api/."
          fi

      - name: Format changed Python files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_RANGE="origin/${{ github.base_ref }}..HEAD"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            DIFF_RANGE="${{ github.event.before }}..HEAD"
          else
            DIFF_RANGE="HEAD~1..HEAD"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only --diff-filter=ACMR "$DIFF_RANGE" | grep '^apps/api/' | sed 's|^apps/api/||' | grep '\.py$' || true)
          if ((${#CHANGED_FILES[@]})); then
            python -m ruff format --check "${CHANGED_FILES[@]}"
          else
            echo "No python files changed in apps/api/."
          fi

      - name: Type check changed backend app files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_RANGE="origin/${{ github.base_ref }}..HEAD"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            DIFF_RANGE="${{ github.event.before }}..HEAD"
          else
            DIFF_RANGE="HEAD~1..HEAD"
          fi

          mapfile -t CHANGED_APP_FILES < <(git diff --name-only --diff-filter=ACMR "$DIFF_RANGE" | grep '^apps/api/app/' | sed 's|^apps/api/||' | grep '\.py$' || true)
          if ((${#CHANGED_APP_FILES[@]})); then
            python -m mypy "${CHANGED_APP_FILES[@]}" --ignore-missing-imports --follow-imports=silent
          else
            echo "No changed backend application Python files under apps/api/app/."
          fi

      - name: Targeted safety lint
        run: |
          python -m ruff check \
            app/broker/trading212.py \
            app/execution/paper_engine.py \
            app/api/v1/routes/orders.py \
            app/api/v1/routes/operator.py \
            app/services/safety_policy.py \
            app/services/live_readiness.py

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run backend validation baseline
        run: python -m pytest -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Migration smoke test
        run: |
          python -m alembic downgrade base
          python -m alembic upgrade head
          echo "Migration round-trip passed"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_MODE: mock
        run: npm run build

      - name: Unit tests
        run: npm test -- --watchAll=false

  e2e:
    name: E2E Mock Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cashguard
          POSTGRES_PASSWORD: cashguard_secret
          POSTGRES_DB: cashguard_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: "."
      DATABASE_URL: postgresql+asyncpg://cashguard:cashguard_secret@127.0.0.1:5432/cashguard_e2e
      REDIS_URL: redis://127.0.0.1:6379/15
      SECRET_KEY: test-secret-key-32-chars-minimum-x
      MASTER_KEY: test-master-key-32-chars-minimum-x
      APP_MODE: mock
      MARKET_DATA_PROVIDER: mock
      ADMIN_EMAIL: admin@localhost
      ADMIN_PASSWORD: change-me
      E2E_ADMIN_EMAIL: admin@localhost
      E2E_ADMIN_PASSWORD: change-me
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_APP_MODE: mock
      BASE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run migrations
        working-directory: apps/api
        run: python -m alembic upgrade head

      - name: Seed database
        working-directory: apps/api
        run: python -m app.db.seed

      - name: Run mock E2E validation
        working-directory: apps/web
        run: |
          (
            cd ../api
            uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/cashguard-api.log 2>&1
          ) &
          npm run dev > /tmp/cashguard-web.log 2>&1 &

          echo "Waiting for API to be ready..."
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/v1/health/ready | tee /tmp/cashguard-api-ready.json >/dev/null 2>&1; then
              echo "API is ready."
              break
            fi
            echo "Waiting for API... ($attempt/30)"
            sleep 2
            if [ "$attempt" -eq 30 ]; then
              echo "Timeout waiting for API"
              cat /tmp/cashguard-api.log
              cat /tmp/cashguard-api-ready.json 2>/dev/null || true
              exit 1
            fi
          done

          echo "Waiting for Web to be ready..."
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/auth/login >/dev/null 2>&1; then
              echo "Web is ready."
              break
            fi
            echo "Waiting for Web... ($attempt/60)"
            sleep 2
            if [ "$attempt" -eq 60 ]; then
              echo "Timeout waiting for Web"
              cat /tmp/cashguard-web.log
              exit 1
            fi
          done

          npm run e2e -- --workers=1 --grep-invert "Operator dashboard — real-backend integration" --timeout 60000

      - name: Run operator integration E2E
        run: make e2e-operator-integration

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: |
            /tmp/cashguard-api.log
            /tmp/cashguard-web.log
          if-no-files-found: ignore

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for prohibited deposit and banking code
        run: |
          echo "Checking for prohibited financial code patterns..."
          if grep -rniE \
            "open[[:space:]._]?banking|plaid|truelayer|bank[._]?account[._]?number|sort[._]?code|debit[._]?card|iban|add[._]?funds|top[._]?up" \
            apps/api/app/ apps/web/app/ apps/web/components/ apps/web/services/ \
            --include="*.py" --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "FAIL: Prohibited financial code found"
            exit 1
          else
            echo "PASS: No prohibited financial code found"
          fi

      - name: Check cash-only mode is hardcoded
        run: |
          grep -n "CASH_ONLY_MODE.*True" apps/api/app/core/config.py
          echo "PASS: cash-only mode hardcoded"

      - name: Check live trading default is false
        run: |
          grep -n "LIVE_TRADING_ENABLED.*False" apps/api/app/core/config.py
          echo "PASS: live trading default is False"
