name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend Targeted
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cashguard
          POSTGRES_PASSWORD: cashguard_secret
          POSTGRES_DB: cashguard_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api
    env:
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

 bolt/optimize-market-regime-evaluation-6534295466724500805
      - name: Dependency vulnerability scan (pip-audit)
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Lint (ruff)
        run: |
          # Only check changed files against the target branch to avoid pre-existing debt.
          # If it's a push to main/develop, we check the whole app/tests.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Get files relative to apps/api/
            # Use two dots to avoid merge-base dependency on shallow/missing history
            mapfile -t CHANGED_FILES < <(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep '^apps/api/' | sed 's|^apps/api/||' | grep '\.py$' || true)
            if ((${#CHANGED_FILES[@]})); then
              python -m ruff check "${CHANGED_FILES[@]}"
            else
              echo "No python files changed in apps/api/."
            fi
          else
            python -m ruff check app/ tests/
          fi

      - name: Format check (ruff)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t CHANGED_FILES < <(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep '^apps/api/' | sed 's|^apps/api/||' | grep '\.py$' || true)
            if ((${#CHANGED_FILES[@]})); then
              python -m ruff format --check "${CHANGED_FILES[@]}"
            else
              echo "No python files changed in apps/api/."
            fi
          else
            python -m ruff format --check app/ tests/
          fi

      - name: Type check (mypy)
        run: python -m mypy app/ --ignore-missing-imports

      - name: Targeted Lint (ruff)
        run: |
          # Linting targeted safety/mock hardening files relevant to this branch.
          python -m ruff check \
            app/execution/paper_engine.py \
            app/api/v1/routes/orders.py \
            app/api/v1/routes/operator.py \
            app/services/live_readiness.py
 main

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://cashguard:cashguard_secret@localhost:5432/cashguard_test
        run: python -m alembic upgrade head

      - name: Run targeted tests
        env:
