repos:
  # ── Secrets detection ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: detect-private-key

  # ── Python: ruff (lint + format) ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  # ── TypeScript/JS: prettier ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^apps/web/
        types_or: [ts, tsx, json, css, markdown]
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-tailwindcss@0.6.9

  # ── Safety check: no .env committed ──────────────────────────────────────
  - repo: local
    hooks:
      - id: no-env-files
        name: Prevent .env files from being committed
        entry: bash -c 'if git diff --cached --name-only | grep -E "^\.env$|\.env\.local$|\.env\.(dev|prod|staging)$"; then echo "ERROR: .env files must not be committed"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: no-deposit-code
        name: Check for prohibited financial code
        entry: bash -c 'if grep -rni "open.banking\|plaid\|truelayer\|debit.card\|sort.code\|add.funds\|top.up" --include="*.py" --include="*.ts" --include="*.tsx" apps/api/app/ apps/web/app/ apps/web/components/ 2>/dev/null | grep -v "test\|spec\|mock\|docs\|README\|security\|not.*contain\|no.*deposit"; then echo "ERROR: Prohibited financial code detected"; exit 1; fi'
        language: system
        pass_filenames: false
