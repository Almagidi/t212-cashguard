global:
  # How long to wait before re-sending an alert that hasn't been resolved
  resolve_timeout: 5m
  # SMTP settings — override via environment or Docker secrets
  smtp_smarthost: '${SMTP_HOST:-localhost}:${SMTP_PORT:-587}'
  smtp_from: '${ALERT_EMAIL_FROM:-alerts@cashguard.local}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'
  smtp_require_tls: true

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress lower-severity alerts when a critical one is already firing
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [team]

# ── Routing tree ──────────────────────────────────────────────────────────────
route:
  receiver: default
  group_by: [alertname, team]
  group_wait: 10s          # Wait before sending first group notification
  group_interval: 2m       # Wait between sending notifications for same group
  repeat_interval: 1h      # How often to re-send if alert keeps firing

  routes:
    # Critical trading safety alerts — immediate notification, no grouping delay
    - matchers:
        - severity = critical
        - team = trading
      receiver: trading-critical
      group_wait: 0s
      repeat_interval: 15m

    # Critical ops alerts (API down, DB down)
    - matchers:
        - severity = critical
        - team = ops
      receiver: ops-critical
      group_wait: 30s
      repeat_interval: 30m

    # Warning-level alerts — batched
    - matchers:
        - severity = warning
      receiver: warnings
      group_wait: 2m
      repeat_interval: 4h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  - name: default
    email_configs:
      - to: '${ALERT_EMAIL_TO:-admin@cashguard.local}'
        send_resolved: true

  - name: trading-critical
    email_configs:
      - to: '${ALERT_EMAIL_TO:-admin@cashguard.local}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] CashGuard Trading Alert: {{ .GroupLabels.alertname }}'
    # Uncomment and configure to add Slack notifications:
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#cashguard-alerts'
    #     send_resolved: true
    #     title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: ops-critical
    email_configs:
      - to: '${ALERT_EMAIL_TO:-admin@cashguard.local}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] CashGuard Ops Alert: {{ .GroupLabels.alertname }}'

  - name: warnings
    email_configs:
      - to: '${ALERT_EMAIL_TO:-admin@cashguard.local}'
        send_resolved: false
        headers:
          Subject: '[WARNING] CashGuard Alert Digest'
